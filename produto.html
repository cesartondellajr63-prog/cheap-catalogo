<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheaps Pods — Produto</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#111;--surface2:#1a1a1a;--border:rgba(255,255,255,0.08);--accent:#c8ff00;--accent2:#7efff5;--text:#fff;--muted:rgba(255,255,255,0.45);--max:680px;--pad:clamp(16px,4vw,28px);}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);overflow-x:hidden;min-height:100vh;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:linear-gradient(135deg,#050505 0%,#242424 33%,#080808 66%,#1e1e1e 100%);background-size:400% 400%;animation:diagGrad 90s ease infinite;}
@keyframes diagGrad{0%{background-position:0% 0%}25%{background-position:100% 0%}50%{background-position:100% 100%}75%{background-position:0% 100%}100%{background-position:0% 0%}}

/* ── TOPBAR ── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:clamp(10px,2vw,14px) var(--pad);}
.topbar-inner{max-width:var(--max);margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;text-decoration:none;white-space:nowrap;min-height:40px;}
.back-btn:hover{border-color:rgba(255,255,255,0.2);color:#fff;}
.topbar-logo{font-family:'Syne',sans-serif;font-size:clamp(16px,3vw,20px);font-weight:800;color:#fff;}
.topbar-logo span{color:var(--accent);}
.cart-pill{display:flex;align-items:center;gap:6px;background:var(--accent);border-radius:99px;padding:8px 14px;font-size:13px;font-weight:700;color:#000;cursor:pointer;transition:all 0.15s;white-space:nowrap;min-height:40px;}
.cart-pill:hover{background:#d8ff20;}
.cart-pill-count{background:#000;color:var(--accent);border-radius:99px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}

/* ── DESKTOP LAYOUT ── */
.product-page{max-width:var(--max);margin:0 auto;padding:clamp(20px,3vw,32px) var(--pad) clamp(100px,12vw,140px);position:relative;z-index:1;}
@media(min-width:700px){
  .product-page{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start;max-width:900px;}
  .product-left{position:sticky;top:80px;}
  .product-right{display:flex;flex-direction:column;gap:24px;}
}

/* ── PRODUCT IMAGE ── */
.product-img{width:100%;aspect-ratio:1/1;border-radius:clamp(16px,3vw,24px);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);margin-bottom:clamp(16px,3vw,24px);}
@media(min-width:700px){.product-img{margin-bottom:0;aspect-ratio:1/1;}}
.product-img-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.placeholder-big-icon{font-size:clamp(60px,10vw,90px);filter:drop-shadow(0 8px 32px rgba(0,0,0,0.5));}
.product-img-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,0.4));}
.product-tags{position:absolute;top:16px;left:16px;display:flex;gap:8px;z-index:2;flex-wrap:wrap;}
.product-brand-tag{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:#fff;letter-spacing:0.5px;text-transform:uppercase;}
.product-brand-dot{width:8px;height:8px;border-radius:50%;}
.product-puffs-tag{background:rgba(200,255,0,0.15);border:1px solid rgba(200,255,0,0.3);border-radius:99px;padding:5px 12px;font-size:12px;font-weight:700;color:var(--accent);}
.dual-badge{position:absolute;bottom:16px;right:16px;z-index:2;background:rgba(126,255,245,0.15);border:1px solid rgba(126,255,245,0.3);border-radius:12px;padding:6px 12px;font-size:11px;font-weight:700;color:var(--accent2);display:flex;align-items:center;gap:6px;}

/* ── PRODUCT INFO ── */
.product-info{margin-bottom:clamp(16px,3vw,24px);}
.product-name{font-family:'Syne',sans-serif;font-size:clamp(24px,5vw,32px);font-weight:800;line-height:1.1;letter-spacing:-0.5px;}
.product-meta{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap;}
.product-brand-label{font-size:13px;color:var(--muted);}
.product-brand-label b{color:#fff;}
.meta-sep{color:var(--border);}
.product-price{font-family:'Syne',sans-serif;font-size:clamp(28px,6vw,36px);font-weight:800;color:var(--accent);margin-top:12px;letter-spacing:-1px;}
.product-price-note{font-size:12px;color:var(--muted);margin-top:4px;}

/* ── FLAVOR SECTION ── */
.flavor-section{margin-bottom:clamp(16px,3vw,24px);}
.flavor-title{font-family:'Syne',sans-serif;font-size:clamp(14px,2vw,16px);font-weight:700;margin-bottom:4px;}
.flavor-subtitle{font-size:13px;color:var(--muted);margin-bottom:12px;}
.flavor-grid{display:flex;flex-direction:column;gap:8px;}
.flavor-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:11px 14px;cursor:pointer;transition:all 0.18s;min-height:46px;}
.flavor-item:hover{border-color:rgba(200,255,0,0.3);background:var(--surface2);}
.flavor-item.selected{border-color:var(--accent);background:rgba(200,255,0,0.06);}
.flavor-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.flavor-item.selected .flavor-radio{border-color:var(--accent);background:var(--accent);}
.flavor-radio-dot{width:8px;height:8px;border-radius:50%;background:#000;display:none;}
.flavor-item.selected .flavor-radio-dot{display:block;}
.flavor-name{font-size:14px;font-weight:500;flex:1;line-height:1.3;}
.flavor-item.selected .flavor-name{color:#fff;font-weight:600;}
.dual-combo-label{font-size:10px;color:var(--accent2);font-weight:600;background:rgba(126,255,245,0.1);border-radius:99px;padding:2px 8px;flex-shrink:0;white-space:nowrap;}

/* ── QTY + ADD ── */
.add-section{}
.qty-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:clamp(12px,2vw,16px);margin-bottom:12px;}
.qty-label{font-size:14px;color:var(--muted);}
.qty-control{display:flex;align-items:center;gap:clamp(8px,2vw,14px);}
.qty-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all 0.15s;}
.qty-btn:hover{background:var(--accent);border-color:var(--accent);color:#000;}
.qty-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;min-width:28px;text-align:center;}
.add-btn{width:100%;background:var(--accent);color:#000;border:none;padding:clamp(14px,2.5vw,17px);border-radius:14px;font-family:'Inter',sans-serif;font-size:clamp(14px,2vw,16px);font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;min-height:52px;}
.add-btn:hover{background:#d8ff20;transform:scale(1.01);}
.add-btn:disabled{opacity:0.35;pointer-events:none;}
.add-btn:active{transform:scale(0.98);}

/* ── TOAST ── */
.toast{position:fixed;bottom:clamp(80px,12vw,100px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid rgba(200,255,0,0.3);border-radius:14px;padding:12px 20px;font-size:14px;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px;z-index:300;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-check{color:var(--accent);font-size:18px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a class="back-btn" href="index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Voltar
    </a>
    <div class="topbar-logo">Cheaps<span>.</span>Pods</div>
    <div class="cart-pill" onclick="goToCart()">
      🛒 <span class="cart-pill-count" id="cartCount">0</span>
    </div>
  </div>
</div>

<div class="product-page" id="productContent"></div>

<div class="toast" id="toast"><span class="toast-check">✓</span><span id="toastMsg">Adicionado!</span></div>

<script>
const BRANDS=[{id:'ignite',label:'Ignite',color:'#ff6a00'},{id:'elfbar',label:'Elf Bar',color:'#3b9eff'},{id:'lostmary',label:'Lost Mary',color:'#ff4e6a'},{id:'blacksheep',label:'Black Sheep',color:'#888888'},{id:'oxbar',label:'Oxbar',color:'#a855f7'}];
const BRAND_GRADIENTS={elfbar:'linear-gradient(135deg,#0a1628 0%,#1a3a6e 100%)',lostmary:'linear-gradient(135deg,#1a0a0a 0%,#5a1a2a 100%)',blacksheep:'linear-gradient(135deg,#111 0%,#2a2a2a 100%)',oxbar:'linear-gradient(135deg,#120a1a 0%,#3a1a6e 100%)',ignite:'linear-gradient(135deg,#1a0a00 0%,#5a2000 100%)'};
const BRAND_ICONS={elfbar:'⚡',lostmary:'💀',blacksheep:'🖤',oxbar:'🟣',ignite:'🔥'};
const CATALOG=[
  {id:'eb-king',brand:'elfbar',model:'Elfbar King',puffs:'40K',price:99.99,dual:false,flavors:['Strawberry Watermelon','Triple Berry','Blue Razz Ice','Blueberry Sour Raspberry','Black Mint','Cherry Sour','Grape Ice','Strawberry Ice','Passion Fruit','Peach Berry Slush','Hawaiian Slush','Double Apple Ice','Miami Mint','Sakura Splash']},
  {id:'eb-trio',brand:'elfbar',model:'Elf Trio',puffs:'40K',price:99.99,dual:false,flavors:['Orange Blast','Sour Strawberry Dragonfruit','Peach Twist','Pineapple Lime','Scary Berry','Black Mint','Cool Menthol','Sakura Grape']},
  {id:'eb-te',brand:'elfbar',model:'Elfbar TE',puffs:'30K',price:89.99,dual:false,flavors:['Watermelon Ice','Bubbaloo Tutti Frutti','Miami Mint','Watermelon Peach']},
  {id:'eb-gh',brand:'elfbar',model:'Elfbar GH',puffs:'23K',price:84.99,dual:false,flavors:['Peach Mango Watermelon','Watermelon Ice','Blueberry Ice','Grape Ice','Sakura Grape','Miami Mint','Strawberry Banana','Kiwi Dragon Fruit','Ice Mint']},
  {id:'eb-bc',brand:'elfbar',model:'Elf BC',puffs:'15K',price:64.99,dual:false,flavors:['Strawberry Ice Cream','Banana Ice','Sakura Grape','Peach Mango Watermelon','Triple Berry Ice','Pear Watermelon Dragonfruit','Strawberry Kiwi']},
  {id:'lm-dura',brand:'lostmary',model:'Lost Dura',puffs:'35K',price:89.99,dual:false,flavors:['Mango Ice','Miami Mint','Pineapple Ice','Strawberry Ice']},
  {id:'bs-30k',brand:'blacksheep',model:'Black Sheep',puffs:'30K',price:99.99,dual:true,flavors:['Açaí Strawberry + Grape','Mango + Grape','Grape + Grape','Açaí Grape + Strawberry Kiwi','Açaí Strawberry Banana + Grape']},
  {id:'ox-30k',brand:'oxbar',model:'Oxbar',puffs:'30K',price:84.99,dual:false,flavors:['Fanta Strawberry','Strawberry Watermelon','OK Love','Grape Peach','Passion Kiwi','Paradise Grape','Raspberry Watermelon']},
  {id:'ox-9k',brand:'oxbar',model:'Oxbar',puffs:'9.5K',price:64.99,dual:false,flavors:['Strawberry Watermelon Ice','Kiwi Passion Fruit Guava','Cool Mint','Watermelon Ice','Apple Kiwi Ice','Cola Ice']},
  {id:'ig-v400m',brand:'ignite',model:'Ignite V400 Mix',puffs:'40K',price:109.99,dual:true,flavors:['Orange Ice + Strawberry Ice','Grape Ice + Strawberry','Apple Ice + Strawberry Watermelon','Icy Mint + Peach Grape','Watermelon Grape Ice + Açaí Ice','Strawberry Mango Ice + Banana Ice','Mango Ice + Passion Fruit Guava','Passion Fruit Sour Kiwi + Pineapple Ice','Strawberry Watermelon Ice + Aloe Grape']},
  {id:'ig-v400',brand:'ignite',model:'Ignite V400',puffs:'40K',price:104.99,dual:false,flavors:['Grape Peach','Strawberry Apple Watermelon','Grape Banana','Peach Mango Watermelon','Passion Fruit Sour Kiwi','Strawberry','Strawberry Watermelon','Sakura Grape','Tutti Frutti Mix','Grape Ice','Mint','Banana Cherry','Watermelon','Pineapple Ice','Peach']},
  {id:'ig-v400s',brand:'ignite',model:'Ignite V400 Sweet',puffs:'40K',price:99.99,dual:false,flavors:['Miami Mint','Strawberry Watermelon','Watermelon Ice','Blueberry Ice','Blue Razz Pop','Pineapple Ice','Grape Ice','Peach Berry Ice','Triple Mango','Cool Menthol']},
  {id:'ig-v250',brand:'ignite',model:'Ignite V250',puffs:'25K',price:89.99,dual:false,flavors:['Strawberry Banana','Icy Mint','Menthol','Strawberry Kiwi','Pineapple Kiwi Dragonfruit','Pineapple Ice','Grape Ice','Watermelon Ice','Minty Melon','Cactus Lime Soda','Strawberry Ice','Blueberry Ice']},
  {id:'ig-v155',brand:'ignite',model:'Ignite V155',puffs:'15K',price:84.99,dual:false,flavors:['Banana Ice','Grape Ice','Strawberry Ice','Tropical Açaí','Watermelon Mix','Strawberry Watermelon Ice','Icy Mint','Strawberry Kiwi','Kiwi Passion Fruit Guava','Watermelon Ice','Strawberry Banana']},
  {id:'ig-v150',brand:'ignite',model:'Ignite V150',puffs:'15K',price:79.99,dual:false,flavors:['Icy Mint','Watermelon Dragon Fruit','Strawberry Ice','Grape Ice','Lemon Lime','Strawberry Kiwi','Watermelon Mix']},
  {id:'ig-v80',brand:'ignite',model:'Ignite V80',puffs:'8K',price:74.99,dual:false,flavors:['Cactus']},
  {id:'ig-v55',brand:'ignite',model:'Ignite V55',puffs:'5K',price:69.99,dual:false,flavors:['Miami Mint','Aloe Grape','Menthol','Strawberry Banana']},
  {id:'ig-nano',brand:'ignite',model:'Ignite V Nano',puffs:'600',price:29.99,dual:false,flavors:['Passion Fruit Sour Kiwi','Strawberry Ice','Icy Mint','Green Apple','Cool Menthol','Tropical Fruit','Pineapple Ice','Grape Ice','Banana Ice']},
];

const fmtR = v => 'R$ '+v.toFixed(2).replace('.',',');
const getBrand = id => BRANDS.find(b=>b.id===id);
let product=null, cart=[], selectedFlavor=null, qty=1;

function init(){
  const id=new URLSearchParams(window.location.search).get('id');
  product=CATALOG.find(p=>p.id===id);
  if(!product){window.location.href='index.html';return;}
  try{cart=JSON.parse(sessionStorage.getItem('cart'))||[];}catch(e){cart=[];}
  if(product.flavors.length===1) selectedFlavor=product.flavors[0];
  document.title=product.model+' — Cheaps Pods';
  renderProduct();
  updateCartPill();
}

function renderProduct(){
  const brand=getBrand(product.brand);
  const grad=BRAND_GRADIENTS[product.brand];
  const icon=BRAND_ICONS[product.brand];
  document.getElementById('productContent').innerHTML=`
    <div class="product-left">
      <div class="product-img" style="background:${grad}">
        <div class="product-img-placeholder"><div class="placeholder-big-icon">${icon}</div></div>
        <div class="product-img-overlay"></div>
        <div class="product-tags">
          <span class="product-brand-tag"><span class="product-brand-dot" style="background:${brand.color}"></span>${brand.label}</span>
          <span class="product-puffs-tag">${product.puffs} puffs</span>
        </div>
        ${product.dual?'<div class="dual-badge">🔀 2 sabores em 1</div>':''}
      </div>
    </div>
    <div class="product-right">
      <div class="product-info">
        <h1 class="product-name">${product.model}</h1>
        <div class="product-meta">
          <span class="product-brand-label">Marca: <b>${brand.label}</b></span>
          <span class="meta-sep">•</span>
          <span class="product-brand-label">${product.flavors.length} sabor${product.flavors.length>1?'es':''}</span>
        </div>
        <div class="product-price">${fmtR(product.price)}</div>
        <div class="product-price-note">por unidade · frete calculado no checkout</div>
      </div>
      <div class="flavor-section">
        <div class="flavor-title">${product.dual?'Escolha a combinação':'Escolha o sabor'}</div>
        <div class="flavor-subtitle">${product.dual?'Cada unidade vem com 2 sabores juntos':'Selecione uma opção abaixo'}</div>
        <div class="flavor-grid" id="flavorGrid">
          ${product.flavors.map(f=>`
            <div class="flavor-item ${selectedFlavor===f?'selected':''}" onclick="selectFlavor(this,'${f.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')">
              <div class="flavor-radio"><div class="flavor-radio-dot"></div></div>
              <span class="flavor-name">${f}</span>
            </div>`).join('')}
        </div>
      </div>
      <div class="add-section">
        <div class="qty-row">
          <span class="qty-label">Quantidade</span>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(-1)">−</button>
            <span class="qty-num" id="qtyNum">1</span>
            <button class="qty-btn" onclick="changeQty(1)">+</button>
          </div>
        </div>
        <button class="add-btn" id="addBtn" onclick="addToCart()" ${!selectedFlavor?'disabled':''}>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          ${!selectedFlavor?'Selecione um sabor':'Adicionar ao carrinho'}
        </button>
      </div>
    </div>`;
}

function selectFlavor(el, f){
  selectedFlavor=f;
  document.querySelectorAll('.flavor-item').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
  const btn=document.getElementById('addBtn');
  if(btn){btn.disabled=false;btn.innerHTML='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg> Adicionar ao carrinho';}
}

function changeQty(delta){
  qty=Math.max(1,qty+delta);
  const el=document.getElementById('qtyNum');
  if(el) el.textContent=qty;
}

function addToCart(){
  if(!selectedFlavor) return;
  const existing=cart.find(i=>i.productId===product.id&&i.flavor===selectedFlavor);
  if(existing) existing.qty+=qty;
  else cart.push({productId:product.id,model:product.model,brand:product.brand,flavor:selectedFlavor,price:product.price,qty});
  sessionStorage.setItem('cart',JSON.stringify(cart));
  updateCartPill();
  showToast(product.model+' — '+selectedFlavor);
}

function updateCartPill(){ document.getElementById('cartCount').textContent=cart.reduce((s,i)=>s+i.qty,0); }
function goToCart(){ sessionStorage.setItem('cart',JSON.stringify(cart)); window.location.href='index.html?opencart=1'; }
function showToast(msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent='Adicionado: '+msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
</body>
</html>
